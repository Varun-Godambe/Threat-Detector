<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatSight - AI-Powered Threat Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-slate-50 dark:bg-gray-900">

    <div class="grid min-h-screen w-full md:grid-cols-[220px_1fr] lg:grid-cols-[280px_1fr]">
        <!-- Sidebar -->
        <div class="hidden border-r bg-white dark:bg-gray-950/40 md:block">
            <div class="flex h-full max-h-screen flex-col gap-2">
                <div class="flex h-14 items-center border-b px-4 lg:h-[60px] lg:px-6">
                    <a href="/" class="flex items-center gap-2 font-semibold text-gray-900 dark:text-gray-50">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6 text-blue-600"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        <span class="text-lg">ThreatSight</span>
                    </a>
                </div>
                <div class="flex-1">
                    <nav class="grid items-start px-2 text-sm font-medium lg:px-4">
                        <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2 bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-50 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path></svg>
                            Analyzer
                        </a>
                        <a href="documentation.html" class="flex items-center gap-3 rounded-lg px-3 py-2 text-gray-500 dark:text-gray-400 transition-all hover:text-gray-900 dark:hover:text-gray-50">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                            Documentation
                        </a>
                    </nav>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex flex-col">
            <header class="flex h-14 items-center gap-4 border-b bg-white dark:bg-gray-950/40 px-4 lg:h-[60px] lg:px-6">
                <div class="w-full flex-1">
                    <h1 class="text-lg font-semibold md:text-2xl text-gray-900 dark:text-gray-50">AI-Powered Threat Analyzer</h1>
                </div>
                <button id="theme-toggle" class="h-9 w-9 rounded-full flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5 hidden"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5 hidden"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </header>

            <main class="flex flex-1 flex-col gap-4 p-4 lg:gap-6 lg:p-6">
                <!-- Tab Navigation -->
                <div class="border-b border-gray-200 dark:border-gray-700">
                    <nav class="-mb-px flex space-x-8" aria-label="Tabs">
                        <button id="tab-file" class="tab-btn active-tab group inline-flex items-center py-4 px-1 border-b-2 font-medium text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="-ml-0.5 mr-2 h-5 w-5"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                            File Analysis
                        </button>
                        <button id="tab-url" class="tab-btn inactive-tab group inline-flex items-center py-4 px-1 border-b-2 font-medium text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="-ml-0.5 mr-2 h-5 w-5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.72"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.72-1.72"></path></svg>
                            URL Analysis
                        </button>
                    </nav>
                </div>

                <!-- Analysis Content Area -->
                <div id="analysis-content">
                    <!-- File Analysis Pane -->
                    <div id="pane-file">
                        <div id="drop-zone" class="flex flex-1 items-center justify-center rounded-xl border-2 border-dashed border-gray-300 dark:border-gray-700 shadow-sm cursor-pointer p-10 transition-colors duration-300 hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/10">
                            <div class="flex flex-col items-center gap-2 text-center">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-10 w-10 text-gray-400 dark:text-gray-500"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                <h3 class="text-2xl font-bold tracking-tight text-gray-800 dark:text-gray-200">Drag and drop your file here</h3>
                                <p class="text-gray-500 dark:text-gray-400">or click to browse your machine</p>
                                <p id="fileName" class="text-blue-600 dark:text-blue-400 text-sm h-5 mt-2 font-medium"></p>
                            </div>
                            <input type="file" id="file-input" class="hidden">
                        </div>
                        <button id="analyzeFileBtn" class="mt-4 w-full bg-blue-600 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 disabled:bg-gray-300 dark:disabled:bg-gray-700 disabled:text-gray-500 dark:disabled:text-gray-400 disabled:cursor-not-allowed shadow hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 dark:focus:ring-blue-800" disabled>
                            Analyze File
                        </button>
                    </div>

                    <!-- URL Analysis Pane -->
                    <div id="pane-url" class="hidden">
                        <div class="flex flex-col gap-2">
                             <label for="url-input" class="text-sm font-medium text-gray-700 dark:text-gray-300">Enter a URL to analyze for threats:</label>
                             <input type="url" id="url-input" placeholder="https://example.com" class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-200">
                        </div>
                         <button id="analyzeUrlBtn" class="mt-4 w-full bg-blue-600 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 disabled:bg-gray-300 dark:disabled:bg-gray-700 disabled:text-gray-500 dark:disabled:text-gray-400 disabled:cursor-not-allowed shadow hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 dark:focus:ring-blue-800" disabled>
                            Analyze URL
                        </button>
                    </div>
                </div>

                <!-- Results Section -->
                <div id="analysis-section" class="hidden mt-6">
                    <div id="loader" class="flex flex-col items-center justify-center py-12">
                        <div class="loader"></div>
                        <p id="loader-text" class="mt-4 text-gray-500 dark:text-gray-400 font-medium">Executing Analysis...</p>
                    </div>
                    <div id="results-container" class="hidden opacity-0 transition-opacity duration-500">
                        <!-- Dynamic content will be injected here -->
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
